<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jana's Meal Plan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,300;1,9..144,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg:            #F5F0E8;
  --card:          #FEFCF8;
  --text:          #1E1810;
  --text-2:        #7A6E62;
  --text-3:        #B0A496;
  --accent:        #B8521E;
  --accent-light:  #FBE9DE;
  --green:         #3A6648;
  --green-light:   #E6F0E9;
  --blue:          #2B5E78;
  --blue-light:    #E1EEF5;
  --border:        #E4DDD2;
  --shadow:        0 2px 20px rgba(30, 24, 16, 0.07);
  --shadow-sm:     0 1px 6px rgba(30, 24, 16, 0.06);

  --tag-meat-bg:   #F2E4D4;  --tag-meat-fg:   #7A3A14;
  --tag-fish-bg:   #D4E4F2;  --tag-fish-fg:   #1A4A6A;
  --tag-plant-bg:  #D4EBD8;  --tag-plant-fg:  #1E5A30;
  --tag-egg-bg:    #F2EBCC;  --tag-egg-fg:    #6A5008;
}

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 15% 10%, rgba(184,82,30,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 50% 35% at 85% 85%, rgba(58,102,72,0.05) 0%, transparent 55%);
  pointer-events: none;
  z-index: 0;
}

.container {
  max-width: 920px;
  margin: 0 auto;
  padding: 32px 20px 80px;
  position: relative;
  z-index: 1;
}

/* ── Header ── */
header {
  text-align: center;
  margin-bottom: 36px;
  padding-bottom: 28px;
  border-bottom: 1px solid var(--border);
}

header h1 {
  font-family: 'Fraunces', serif;
  font-size: 2.4rem;
  font-weight: 300;
  font-optical-sizing: auto;
  letter-spacing: -0.01em;
  margin-bottom: 8px;
  line-height: 1.15;
}

header h1 em {
  font-style: italic;
  color: var(--accent);
}

header p {
  color: var(--text-2);
  font-size: 0.88rem;
  font-weight: 400;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.week-chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 0.75rem;
  font-weight: 500;
  color: var(--text-2);
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 50px;
  padding: 4px 12px;
}

.header-meta {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 10px;
}

.translate-btn {
  font-family: 'Outfit', sans-serif;
  font-size: 0.78rem;
  font-weight: 500;
  letter-spacing: 0.02em;
  border: 1px solid var(--border);
  background: var(--card);
  border-radius: 50px;
  padding: 5px 14px;
  cursor: pointer;
  color: var(--text-2);
  transition: color 0.15s, background 0.15s, border-color 0.15s;
}

.translate-btn:hover {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

/* ── Macro Summary ── */
.macro-summary {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 28px;
}

.macro-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px 12px;
  text-align: center;
  box-shadow: var(--shadow-sm);
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}

.macro-box:hover { transform: translateY(-1px); box-shadow: var(--shadow); }

.macro-box .value {
  font-family: 'Fraunces', serif;
  font-size: 1.6rem;
  font-weight: 400;
  font-optical-sizing: auto;
  color: var(--text);
  line-height: 1;
  margin-bottom: 5px;
}

.macro-box .label {
  font-size: 0.75rem;
  color: var(--text-2);
  font-weight: 500;
  letter-spacing: 0.03em;
  text-transform: uppercase;
}

/* ── Tabs ── */
.tabs-wrap {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 50px;
  padding: 5px;
  display: flex;
  gap: 3px;
  margin-bottom: 28px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  box-shadow: var(--shadow-sm);
}

.tabs-wrap::-webkit-scrollbar { display: none; }

.tab {
  font-family: 'Outfit', sans-serif;
  font-size: 0.82rem;
  font-weight: 500;
  letter-spacing: 0.02em;
  color: var(--text-2);
  background: transparent;
  border: none;
  border-radius: 50px;
  padding: 8px 14px;
  cursor: pointer;
  white-space: nowrap;
  transition: color 0.15s ease, background 0.15s ease;
  flex-shrink: 0;
}

.tab:hover { color: var(--text); }

.tab.active {
  background: var(--accent);
  color: #fff;
  box-shadow: 0 2px 8px rgba(184, 82, 30, 0.35);
}

.tab.shop-tab.active,
.tab.prep-tab.active {
  background: var(--text);
  box-shadow: 0 2px 8px rgba(30,24,16,0.25);
}

/* ── Content animation ── */
.tab-content { animation: pageIn 0.22s ease; }

@keyframes pageIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Day Cards ── */
.day-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 18px;
  margin-bottom: 18px;
  overflow: hidden;
  box-shadow: var(--shadow);
}

.day-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 18px 24px 14px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(135deg, rgba(184,82,30,0.04) 0%, transparent 60%);
}

.day-name {
  font-family: 'Fraunces', serif;
  font-size: 1.2rem;
  font-weight: 400;
  font-optical-sizing: auto;
  letter-spacing: -0.01em;
}

.day-macros {
  font-size: 0.78rem;
  color: var(--text-2);
}

/* ── Meal ── */
.meal {
  padding: 18px 24px;
  border-bottom: 1px solid #f0ebe2;
}

.meal:last-child { border-bottom: none; }

/* Leftover lunch style */
.meal--leftover {
  background: rgba(176, 164, 150, 0.03);
}

.meal--leftover .meal-label {
  color: var(--text-3);
}

.meal--leftover .meal-title {
  color: var(--text-2);
}

.meal-label {
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-3);
  margin-bottom: 5px;
}

.meal-title {
  font-family: 'Fraunces', serif;
  font-size: 1.05rem;
  font-weight: 400;
  font-optical-sizing: auto;
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 9px;
  line-height: 1.3;
}

/* ── Tags ── */
.tag {
  font-family: 'Outfit', sans-serif;
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  border-radius: 50px;
  padding: 3px 9px;
  white-space: nowrap;
}

.tag-meat  { background: var(--tag-meat-bg);  color: var(--tag-meat-fg); }
.tag-fish  { background: var(--tag-fish-bg);  color: var(--tag-fish-fg); }
.tag-plant { background: var(--tag-plant-bg); color: var(--tag-plant-fg); }
.tag-egg   { background: var(--tag-egg-bg);   color: var(--tag-egg-fg); }

/* ── Meal Macros ── */
.meal-macros {
  display: flex;
  flex-wrap: wrap;
  gap: 6px 14px;
  font-size: 0.8rem;
  color: var(--text-2);
  margin-bottom: 12px;
}

.meal-macros strong { color: var(--text); font-weight: 600; }

/* ── Meal actions row ── */
.meal-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.ingredients-toggle {
  font-family: 'Outfit', sans-serif;
  font-size: 0.78rem;
  font-weight: 500;
  color: var(--accent);
  background: var(--accent-light);
  border: none;
  border-radius: 50px;
  padding: 5px 14px;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
}

.ingredients-toggle:hover {
  background: var(--accent);
  color: #fff;
}

.swap-btn {
  font-family: 'Outfit', sans-serif;
  font-size: 0.78rem;
  font-weight: 500;
  color: var(--text-2);
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 50px;
  padding: 5px 12px;
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
}

.swap-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}

/* ── Recipe Detail ── */
.recipe-detail {
  margin-top: 14px;
  padding-top: 16px;
  border-top: 1px solid #f0ebe2;
  animation: recipeIn 0.2s ease;
}

@keyframes recipeIn {
  from { opacity: 0; transform: translateY(-4px); }
  to   { opacity: 1; transform: translateY(0); }
}

.recipe-detail h4 {
  font-family: 'Fraunces', serif;
  font-size: 0.82rem;
  font-weight: 400;
  font-optical-sizing: auto;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-2);
  margin-bottom: 8px;
  margin-top: 14px;
}

.recipe-detail h4:first-child { margin-top: 0; }

.recipe-detail ul,
.recipe-detail ol {
  padding-left: 18px;
  font-size: 0.875rem;
  color: var(--text);
  line-height: 1.65;
}

.recipe-detail li { margin-bottom: 4px; }

.prep-time {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  margin-top: 12px;
  font-size: 0.75rem;
  font-weight: 500;
  color: var(--blue);
  background: var(--blue-light);
  border-radius: 50px;
  padding: 4px 11px;
}

/* ── Note ── */
.note {
  background: var(--accent-light);
  border-left: 3px solid var(--accent);
  border-radius: 0 12px 12px 0;
  padding: 14px 18px;
  font-size: 0.84rem;
  color: var(--accent);
  margin-top: 20px;
  line-height: 1.6;
}

/* ── Shopping List ── */
.shop-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.shop-title {
  font-family: 'Fraunces', serif;
  font-size: 1.4rem;
  font-weight: 300;
  font-optical-sizing: auto;
}

.clear-btn {
  font-family: 'Outfit', sans-serif;
  font-size: 0.78rem;
  font-weight: 500;
  color: var(--text-2);
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 50px;
  padding: 6px 14px;
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
}

.clear-btn:hover { border-color: var(--accent); color: var(--accent); }

.shop-section {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px 22px;
  margin-bottom: 14px;
  box-shadow: var(--shadow-sm);
}

.shop-section h3 {
  font-family: 'Fraunces', serif;
  font-size: 1rem;
  font-weight: 400;
  font-optical-sizing: auto;
  margin-bottom: 14px;
  color: var(--text);
}

.shop-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 0;
  border-bottom: 1px solid #f0ebe2;
  font-size: 0.875rem;
}

.shop-item:last-child { border-bottom: none; }

.shop-item input[type="checkbox"] {
  appearance: none;
  -webkit-appearance: none;
  width: 20px;
  height: 20px;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  background: #fff;
  cursor: pointer;
  flex-shrink: 0;
  transition: border-color 0.15s, background 0.15s;
  position: relative;
}

.shop-item input[type="checkbox"]:hover { border-color: var(--green); }

.shop-item input[type="checkbox"]:checked {
  background: var(--green);
  border-color: var(--green);
}

.shop-item input[type="checkbox"]:checked::after {
  content: '';
  position: absolute;
  top: 3px;
  left: 6px;
  width: 5px;
  height: 9px;
  border: 2px solid #fff;
  border-top: none;
  border-left: none;
  transform: rotate(45deg);
}

.shop-item.checked label {
  text-decoration: line-through;
  color: var(--text-3);
}

.shop-item label { cursor: pointer; flex: 1; transition: color 0.2s; }

.shop-item .qty {
  color: var(--text-3);
  font-size: 0.78rem;
  font-weight: 500;
  min-width: 80px;
  text-align: right;
}

/* ── Batch Prep ── */
.prep-header { margin-bottom: 20px; }

.prep-header h2 {
  font-family: 'Fraunces', serif;
  font-size: 1.4rem;
  font-weight: 300;
  font-optical-sizing: auto;
  margin-bottom: 4px;
}

.prep-header p { font-size: 0.83rem; color: var(--text-2); }

.prep-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px 22px;
  margin-bottom: 14px;
  box-shadow: var(--shadow-sm);
}

.prep-step {
  display: flex;
  gap: 16px;
  padding: 12px 0;
  border-bottom: 1px solid #f0ebe2;
}

.prep-step:last-child { border-bottom: none; }

.prep-number {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  background: var(--blue-light);
  color: var(--blue);
  font-weight: 700;
  font-size: 0.75rem;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 1px;
}

.prep-content h4 { font-size: 0.9rem; font-weight: 600; margin-bottom: 3px; }
.prep-content p  { font-size: 0.84rem; color: var(--text-2); line-height: 1.55; margin-bottom: 4px; }

.prep-time-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 0.73rem;
  font-weight: 500;
  color: var(--blue);
  background: var(--blue-light);
  border-radius: 50px;
  padding: 3px 10px;
}

/* ── Responsive ── */
@media (max-width: 600px) {
  .macro-summary { grid-template-columns: repeat(2, 1fr); }
  .container { padding: 18px 14px 50px; }
  header h1 { font-size: 1.8rem; }
  .day-header { flex-direction: column; gap: 3px; }
  .meal { padding: 14px 16px; }
  .day-header { padding: 14px 16px 12px; }
  .shop-section, .prep-card { padding: 16px; }
  .tab { padding: 7px 11px; font-size: 0.78rem; }
}
</style>

<script>
// ── Translations ──────────────────────────────────────────────
const translations = {

  },

    htmlLang: 'de',

    subtitle: 'Glutenfrei · Milchfrei · Proteinreich · ~1300 kcal/Tag',
    avgKcal: 'Ø kcal', protein: 'Eiweiß', fat: 'Fett', carbs: 'KH',
    allDays: 'Alle Tage',
    shopTab: '🛒 Einkauf',
    prepTab: '📋 Vorbereitung',
    dayShort: ['Mo','Di','Mi','Do','Fr','Sa','So'],
    dayFull:  ['Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag','Sonntag'],
    lunch: 'Mittagessen', dinner: 'Abendessen',
    lunchSub: 'Reste vom Vortag', dinnerSub: 'heute kochen',
    showRecipe: '▸ Rezept anzeigen', hideRecipe: '▾ Rezept verstecken',
    swap: '🔀 Tauschen',
    ingredients: 'Zutaten', method: 'Zubereitung',
    shopTitle: 'Einkaufsliste diese Woche', clearAll: 'Alle löschen',
    checkStock: 'Vorrat prüfen',
    prepTitle: 'Sonntagsvorbereitung',
    prepSub: 'Auf diese Woche abgestimmt · Ofengerichte gleichzeitig zubereiten',
    prepEmpty: 'Keine Vorbereitungen für diese Woche nötig.',
    tipPlan:    'Der Plan wird jeden Montag aktualisiert. Mit 🔀 kann jedes Abendessen einzeln getauscht werden — Änderungen bleiben die ganze Woche gespeichert.',

};

let lang = localStorage.getItem('jana-lang') || 'de';

function t(key) {
  return translations[lang][key] ?? translations['en'][key] ?? key;
}

function setLang(l) {
  lang = l;
  localStorage.setItem('jana-lang', l);
  document.documentElement.lang = translations[l].htmlLang;
  render();
}

function localizedField(obj, key) {
  if (lang === 'de' && obj?.[`${key}_de`]) return obj[`${key}_de`];
  return obj?.[key];
}

function localizedTimeLabel(time) {
  if (lang !== 'de' || !time) return time;
  return time
    .replace('(prepped)', '(vorbereitet)')
    .replace('(passive)', '(passiv)')
    .replace(/\bprep\b/g, 'Vorb.')
    .replace(/\boven\b/g, 'Ofen');
}

// ── Week helpers ───────────────────────────────────────────────
function getWeekSeed() {
  const d = new Date();
  const jan1 = new Date(d.getFullYear(), 0, 1);
  const week = Math.ceil(((d - jan1) / 86400000 + jan1.getDay() + 1) / 7);
  return d.getFullYear() * 100 + week;
}

function getWeekLabel() {
  const d = new Date();
  const monday = new Date(d);
  const day = d.getDay() || 7;
  monday.setDate(d.getDate() - day + 1);
  const sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);
  const locale = lang === 'de' ? 'de-DE' : 'en-GB';
  const fmt = dt => dt.toLocaleDateString(locale, { day: 'numeric', month: 'short' });
  return `${fmt(monday)} – ${fmt(sunday)}`;
}

// ── Seeded PRNG (mulberry32) ───────────────────────────────────
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// ── Plan generation ───────────────────────────────────────────
function generateWeekPlan(seed) {
  const rng = mulberry32(seed);

  // Fisher-Yates shuffle a copy of the pool
  const pool = [...recipePool];
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }

  // Greedy pick 7 with tag balance (max 2 per tag, ≥1 fish, ≥1 plant)
  const tagCounts = {};
  const selected = [];

  for (const recipe of pool) {
    if (selected.length === 7) break;
    const count = tagCounts[recipe.tag] || 0;
    if (count >= 2) continue;

    // If we're on the last 1-2 slots and still missing fish or plant, enforce it
    const slotsLeft = 7 - selected.length;
    const hasFish  = selected.some(r => r.tag === 'fish');
    const hasPlant = selected.some(r => r.tag === 'plant');

    if (slotsLeft === 1 && !hasFish  && recipe.tag !== 'fish')  continue;
    if (slotsLeft === 1 && !hasPlant && recipe.tag !== 'plant') continue;
    if (slotsLeft === 2 && !hasFish  && !hasPlant && recipe.tag === 'meat') continue;

    tagCounts[recipe.tag] = count + 1;
    selected.push(recipe);
  }

  // Fallback: fill any remaining slots ignoring constraints
  if (selected.length < 7) {
    const usedIds = new Set(selected.map(r => r.id));
    for (const recipe of pool) {
      if (selected.length === 7) break;
      if (!usedIds.has(recipe.id)) selected.push(recipe);
    }
  }

  return selected.map(r => r.id);
}

function getActivePlan() {
  const seed = getWeekSeed();
  const swapsKey = `jana-swaps-${seed}`;
  const baseIds = generateWeekPlan(seed);
  const swaps = JSON.parse(localStorage.getItem(swapsKey) || '{}');

  // Clean up stale swap data from old weeks
  for (const k of Object.keys(localStorage)) {
    if (k.startsWith('jana-swaps-') && k !== swapsKey) localStorage.removeItem(k);
  }

  return baseIds.map((id, i) => {
    const overrideId = swaps[String(i)];
    return recipePool.find(r => r.id === (overrideId || id))
        || recipePool.find(r => r.id === id);
  });
}

// ── Swap ──────────────────────────────────────────────────────
function swapMeal(dayIndex) {
  const seed = getWeekSeed();
  const current = getActivePlan();
  const usedIds = new Set(current.map(r => r.id));
  const cur = current[dayIndex];

  // Prefer same tag; fall back to any unused recipe
  let candidates = recipePool.filter(r => !usedIds.has(r.id) && r.tag === cur.tag);
  if (!candidates.length) candidates = recipePool.filter(r => !usedIds.has(r.id));
  if (!candidates.length) return;

  // Use a mix of stable seed + time so each click gives a different recipe
  const pick = candidates[Math.floor(
    mulberry32(seed ^ (dayIndex * 0xDEAD) ^ (Date.now() & 0xFFFF))() * candidates.length
  )];

  const swapsKey = `jana-swaps-${seed}`;
  const swaps = JSON.parse(localStorage.getItem(swapsKey) || '{}');
  swaps[String(dayIndex)] = pick.id;
  localStorage.setItem(swapsKey, JSON.stringify(swaps));
  render();
}

// ── Shopping list aggregation ─────────────────────────────────
function generateShoppingList(recipes) {
  const agg = {}; // name.toLowerCase() → { name, total, unit, category, isStock }

  for (const recipe of recipes) {
    for (const item of recipe.shopItems) {
      const key = item.name.toLowerCase();
      if (!agg[key]) {
        agg[key] = { name: item.name, total: 0, unit: item.unit, category: item.category, isStock: item.qty === null };
      }
      if (item.qty !== null) agg[key].total += item.qty * 2; // ×2: dinner + leftover lunch
    }
  }

  const cats = t('cats');
  const catOrder = Object.keys(cats);
  const result = {};
  for (const cat of catOrder) {
    const label = cats[cat];
    const items = Object.values(agg)
      .filter(i => i.category === cat)
      .sort((a, b) => a.name.localeCompare(b.name))
      .map(i => ({ name: i.name, qty: fmtQty(i) }));
    if (items.length) result[label] = items;
  }
  return result;
}

function fmtQty(item) {
  if (item.isStock) return t('checkStock');
  const q = item.total, u = item.unit;
  if (u === 'g' || u === 'ml') return `${q}${u}`;
  if (u === 'whole')  return `× ${Math.ceil(q)}`;
  if (u === 'cloves') return `${q} ${t('units').cloves}`;
  if (u === 'stalks') return `${q} ${t('units').stalks}`;
  if (u === 'slices') return `${q} ${t('units').slices}`;
  if (u === 'tbsp')   return `${q} ${t('units').tbsp}`;
  return `${q} ${u}`;
}

// ── Dynamic batch prep ────────────────────────────────────────
function getDynamicBatchPrep(recipes) {
  const steps = [];
  const seen = new Set();
  for (const recipe of recipes) {
    for (const item of recipe.shopItems) {
      const rule = batchPrepRules[item.name];
      if (rule && !seen.has(item.name)) {
        seen.add(item.name);
        steps.push(rule);
      }
    }
  }
  return steps;
}

// ── State ──────────────────────────────────────────────────────
let activeTab = 0;
let expandedMeals = {};
let checkedItems = JSON.parse(localStorage.getItem('jana-checked') || '{}');

function setTab(i) { activeTab = i; render(); }

function toggleMeal(key) { expandedMeals[key] = !expandedMeals[key]; render(); }

function toggleCheck(key) {
  checkedItems[key] = !checkedItems[key];
  if (!checkedItems[key]) delete checkedItems[key];
  localStorage.setItem('jana-checked', JSON.stringify(checkedItems));
  render();
}

function clearAll() {
  checkedItems = {};
  localStorage.removeItem('jana-checked');
  render();
}

// ── Render ────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  document.documentElement.lang = translations[lang].htmlLang;

  const plan = getActivePlan(); // 7 recipes — these are the dinners (Mon–Sun)
  const days = t('dayFull');

  // Each day: dinner = plan[i], lunch = plan[(i+6)%7] (yesterday's dinner)
  const weekDays = days.map((day, i) => ({
    day,
    dinner: plan[i],
    lunch:  plan[(i + 6) % 7],
    get totalCal() { return this.dinner.cal + this.lunch.cal; },
    get totalP()   { return this.dinner.protein + this.lunch.protein; },
    get totalF()   { return this.dinner.fat + this.lunch.fat; },
    get totalC()   { return this.dinner.carbs + this.lunch.carbs; }
  }));

  const avgCal = Math.round(weekDays.reduce((s, d) => s + d.totalCal, 0) / 7);
  const avgP   = Math.round(weekDays.reduce((s, d) => s + d.totalP,   0) / 7);
  const avgF   = Math.round(weekDays.reduce((s, d) => s + d.totalF,   0) / 7);
  const avgC   = Math.round(weekDays.reduce((s, d) => s + d.totalC,   0) / 7);

  let html = `
    <header>
      <h1><em>Jana's</em> ${t('title')}</h1>
      <p>${t('subtitle')}</p>
      <div class="header-meta">
        <span class="week-chip">📅 ${getWeekLabel()}</span>
        <button class="translate-btn" onclick="setLang(lang === 'de' ? 'en' : 'de')">
          ${lang === 'de' ? '🌐 Translate to English' : '🌐 Auf Deutsch'}
        </button>
      </div>
    </header>

    <div class="macro-summary">
      <div class="macro-box"><div class="value">${avgCal}</div><div class="label">${t('avgKcal')}</div></div>
      <div class="macro-box"><div class="value">${avgP}g</div><div class="label">${t('protein')}</div></div>
      <div class="macro-box"><div class="value">${avgF}g</div><div class="label">${t('fat')}</div></div>
      <div class="macro-box"><div class="value">${avgC}g</div><div class="label">${t('carbs')}</div></div>
    </div>

    <div class="tabs-wrap">
  `;

  const tabLabels = [t('allDays'), ...t('dayShort'), t('shopTab'), t('prepTab')];
  const shopIdx = tabLabels.length - 2;
  const prepIdx = tabLabels.length - 1;

  tabLabels.forEach((label, i) => {
    const extra = i === shopIdx ? ' shop-tab' : i === prepIdx ? ' prep-tab' : '';
    html += `<button class="tab${extra}${i === activeTab ? ' active' : ''}" onclick="setTab(${i})">${label}</button>`;
  });

  html += `</div><div class="tab-content">`;

  if (activeTab === shopIdx) {
    html += renderShoppingList(plan);
  } else if (activeTab === prepIdx) {
    html += renderBatchPrep(plan);
  } else {
    const toShow = activeTab === 0 ? weekDays : [weekDays[activeTab - 1]];
    const startIdx = activeTab === 0 ? 0 : activeTab - 1;

    toShow.forEach((dayData, localIdx) => {
      const dayIdx = activeTab === 0 ? localIdx : startIdx;
      html += renderDayCard(dayData, dayIdx);
    });

    if (activeTab === 0) {
      html += `<div class="note">💡 ${t('tipPlan')}</div>`;
    }
  }

  html += `</div>`;
  app.innerHTML = html;
}

function renderDayCard(dayData, dayIdx) {
  const { day, dinner, lunch } = dayData;
  const totalCal = dinner.cal + lunch.cal;
  const totalP = dinner.protein + lunch.protein;
  const totalF = dinner.fat + lunch.fat;
  const totalC = dinner.carbs + lunch.carbs;

  let html = `
    <div class="day-card">
      <div class="day-header">
        <div class="day-name">${day}</div>
        <div class="day-macros">${totalCal} kcal &middot; ${totalP}g P &middot; ${totalF}g F &middot; ${totalC}g C</div>
      </div>
  `;

  // ── Lunch (leftover from previous day's dinner) ──
  const lunchKey = `${dayIdx}-lunch`;
  const lunchExpanded = expandedMeals[lunchKey];
  html += `
    <div class="meal meal--leftover">
      <div class="meal-label">${t('lunch')} &middot; ${t('lunchSub')}</div>
      <div class="meal-title">
        ${localizedField(lunch, 'title')}
        <span class="tag tag-${lunch.tag}">${localizedField(lunch, 'tagLabel')}</span>
      </div>
      <div class="meal-macros">
        <span><strong>${lunch.cal}</strong> kcal</span>
        <span><strong>${lunch.protein}g</strong> ${t('protein').toLowerCase()}</span>
        <span><strong>${lunch.fat}g</strong> ${t('fat').toLowerCase()}</span>
        <span><strong>${lunch.carbs}g</strong> ${t('carbs').toLowerCase()}</span>
      </div>
      <div class="meal-actions">
        <button class="ingredients-toggle" onclick="toggleMeal('${lunchKey}')">
          ${lunchExpanded ? t('hideRecipe') : t('showRecipe')}
        </button>
      </div>
  `;
  if (lunchExpanded) html += recipeDetail(lunch);
  html += `</div>`;

  // ── Dinner (fresh cook tonight) ──
  const dinnerKey = `${dayIdx}-dinner`;
  const dinnerExpanded = expandedMeals[dinnerKey];
  html += `
    <div class="meal">
      <div class="meal-label">${t('dinner')} &middot; ${t('dinnerSub')}</div>
      <div class="meal-title">
        ${localizedField(dinner, 'title')}
        <span class="tag tag-${dinner.tag}">${localizedField(dinner, 'tagLabel')}</span>
      </div>
      <div class="meal-macros">
        <span><strong>${dinner.cal}</strong> kcal</span>
        <span><strong>${dinner.protein}g</strong> ${t('protein').toLowerCase()}</span>
        <span><strong>${dinner.fat}g</strong> ${t('fat').toLowerCase()}</span>
        <span><strong>${dinner.carbs}g</strong> ${t('carbs').toLowerCase()}</span>
      </div>
      <div class="meal-actions">
        <button class="ingredients-toggle" onclick="toggleMeal('${dinnerKey}')">
          ${dinnerExpanded ? t('hideRecipe') : t('showRecipe')}
        </button>
        <button class="swap-btn" onclick="swapMeal(${dayIdx})">${t('swap')}</button>
      </div>
  `;
  if (dinnerExpanded) html += recipeDetail(dinner);
  html += `</div>`;

  html += `</div>`; // end day-card
  return html;
}

function recipeDetail(recipe) {
  return `
    <div class="recipe-detail">
      <h4>${t('ingredients')}</h4>
      <ul>${localizedField(recipe, 'ingredients').map(i => `<li>${i}</li>`).join('')}</ul>
      <h4>${t('method')}</h4>
      <ol>${localizedField(recipe, 'steps').map(s => `<li>${s}</li>`).join('')}</ol>
      <div class="prep-time">⏱ ${localizedTimeLabel(localizedField(recipe, 'time'))}</div>
    </div>
  `;
}

function renderShoppingList(plan) {
  const anyChecked = Object.values(checkedItems).some(Boolean);
  const list = generateShoppingList(plan);

  let html = `
    <div class="shop-header">
      <div class="shop-title">${t('shopTitle')}</div>
      ${anyChecked ? `<button class="clear-btn" onclick="clearAll()">${t('clearAll')}</button>` : ''}
    </div>
  `;

  Object.entries(list).forEach(([category, items]) => {
    html += `<div class="shop-section"><h3>${category}</h3>`;
    items.forEach((item, i) => {
      const key = `${category}-${i}`;
      const checked = !!checkedItems[key];
      html += `
        <div class="shop-item ${checked ? 'checked' : ''}">
          <input type="checkbox" id="${key}" ${checked ? 'checked' : ''} onchange="toggleCheck('${key}')">
          <label for="${key}">${item.name}</label>
          <span class="qty">${item.qty}</span>
        </div>
      `;
    });
    html += `</div>`;
  });

  return html;
}

function renderBatchPrep(plan) {
  const steps = getDynamicBatchPrep(plan);

  let html = `
    <div class="prep-header">
      <h2>${t('prepTitle')}</h2>
      <p>${t('prepSub')}</p>
    </div>
    <div class="prep-card">
  `;

  if (steps.length === 0) {
    html += `<p style="color:var(--text-2); font-size:0.875rem; padding: 8px 0;">${t('prepEmpty')}</p>`;
  } else {
    steps.forEach((step, i) => {
      html += `
        <div class="prep-step">
          <div class="prep-number">${i + 1}</div>
          <div class="prep-content">
            <h4>${localizedField(step, 'title')}</h4>
            <p>${localizedField(step, 'desc')}</p>
            <span class="prep-time-badge">⏱ ${localizedTimeLabel(localizedField(step, 'time'))}</span>
          </div>
        </div>
      `;
    });
  }

  html += `
    </div>
    <div class="note">💡 ${t('tipStorage')}</div>
  `;

  return html;
}

render();
</script>
</body>
</html>
